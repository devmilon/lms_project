{% extends "base.html" %}

{% block content %}

<h2>All Courses</h2>

<div class="row">

{% for course in courses %}

<div class="col-md-4">

<div class="card mb-4 shadow-sm">

<div class="card-body">

<h5>{{ course.title }}</h5>

<p>{{ course.description|truncatewords:20 }}</p>

<p><strong>Price:</strong> ${{ course.price }}</p>

<a href="/courses/{{course.id}}" class="btn btn-primary">
View Course
</a>

</div>

</div>

</div>

{% endfor %}

</div>

{% endblock %}
