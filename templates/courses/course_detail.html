{% extends "base.html" %}

{% block content %}

<h2>{{ course.title }}</h2>

<p>{{ course.description }}</p>

<p><strong>Instructor:</strong> {{ course.instructor }}</p>

<button class="btn btn-success">Enroll Now</button>

<hr>

<h4>Lessons</h4>

<ul class="list-group">

{% for lesson in lessons %}

<li class="list-group-item">

<a href="/lesson/{{lesson.id}}">

{{ lesson.title }}

</a>

</li>

{% endfor %}

</ul>

{% endblock %}
