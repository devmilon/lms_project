{% extends "base.html" %}

{% block content %}

<h2>Student Dashboard</h2>


<div class="card p-3">

<p>Welcome {{request.user.username}}</p>

<p>You are logged in as Student</p>

<a href="/accounts/logout/" class="btn btn-danger">
Logout
</a>

</div>

<h4>My Courses</h4>

<div class="row">

{% for course in courses %}

<div class="col-md-4">

<div class="card mb-3">

<div class="card-body">

<h5>{{ course.title }}</h5>

<a href="/courses/{{course.id}}" class="btn btn-primary">
Continue Learning
</a>

</div>

</div>

</div>

{% endfor %}

</div>

{% endblock %}
